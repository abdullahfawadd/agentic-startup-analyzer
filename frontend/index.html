<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Startup Idea Validator</title>
    <style>
      :root {
        --bg: #0b0c0f;
        --bg-2: #101217;
        --rail: #0d0e11;
        --surface: #1f2024;
        --surface-2: #282a30;
        --surface-3: #17191f;
        --line: rgba(255, 255, 255, 0.1);
        --line-strong: rgba(255, 255, 255, 0.16);
        --text: #f1f3f4;
        --muted: #bdc1c6;
        --muted-2: #8e949d;
        --blue: #8ab4f8;
        --blue-2: #5f8cff;
        --cyan: #67e8d4;
        --violet: #c58af9;
        --green: #81c995;
        --amber: #fdd663;
        --red: #f28b82;
        --radius-pill: 999px;
        --radius-xl: 34px;
        --radius-lg: 24px;
        --shadow: 0 28px 90px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--bg);
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--text);
        background:
          radial-gradient(ellipse at 50% 18%, rgba(138, 180, 248, 0.22) 0%, rgba(197, 138, 249, 0.13) 24%, rgba(11, 12, 15, 0) 52%),
          radial-gradient(circle at 78% 8%, rgba(103, 232, 212, 0.12), rgba(11, 12, 15, 0) 24%),
          linear-gradient(180deg, #0d0e11 0%, #0b0c0f 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        letter-spacing: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .layout {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 68px minmax(0, 1fr);
      }

      .rail {
        position: sticky;
        top: 0;
        height: 100vh;
        background: rgba(11, 12, 15, 0.88);
        border-right: 1px solid rgba(255, 255, 255, 0.04);
        display: grid;
        grid-template-rows: auto 1fr auto;
        justify-items: center;
        padding: 20px 0 16px;
      }

      .spark {
        width: 26px;
        height: 26px;
        position: relative;
      }

      .spark::before,
      .spark::after {
        content: "";
        position: absolute;
        inset: 6px;
        border-radius: 3px;
        background: linear-gradient(135deg, #4aa3ff, var(--cyan), var(--violet));
        transform: rotate(45deg);
      }

      .spark::after {
        inset: 10px;
        background: #ffffff;
        opacity: 0.85;
      }

      .rail-group {
        display: grid;
        gap: 18px;
        align-content: start;
        margin-top: 34px;
      }

      .rail-bottom {
        display: grid;
        gap: 14px;
      }

      .icon-btn,
      .avatar {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: var(--radius-pill);
        color: var(--text);
        background: transparent;
        display: grid;
        place-items: center;
        position: relative;
      }

      .icon-btn.active {
        background: rgba(255, 255, 255, 0.08);
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .icon {
        width: 18px;
        height: 18px;
        border: 2px solid currentColor;
        display: block;
      }

      .icon.compose {
        border-radius: 50%;
      }

      .icon.compose::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 2px;
        background: currentColor;
        transform: rotate(-35deg);
        margin-left: 3px;
        margin-top: 8px;
        border-radius: 99px;
      }

      .icon.search {
        border-radius: 50%;
      }

      .icon.search::after {
        content: "";
        position: absolute;
        width: 9px;
        height: 2px;
        background: currentColor;
        transform: translate(12px, 13px) rotate(45deg);
        border-radius: 99px;
      }

      .icon.grid {
        border: 0;
        display: grid;
        grid-template-columns: repeat(2, 7px);
        grid-template-rows: repeat(2, 7px);
        gap: 4px;
      }

      .icon.grid::before,
      .icon.grid::after,
      .icon.grid span,
      .icon.grid i {
        content: "";
        width: 7px;
        height: 7px;
        border: 2px solid currentColor;
        border-radius: 4px;
      }

      .blue-dot {
        position: absolute;
        right: 4px;
        top: 7px;
        width: 10px;
        height: 10px;
        background: #4b8dff;
        border-radius: var(--radius-pill);
      }

      .avatar {
        overflow: hidden;
        font-weight: 800;
        color: #0d0e11;
        background: linear-gradient(135deg, var(--blue), var(--violet), var(--cyan));
      }

      .main {
        min-width: 0;
        min-height: 100vh;
        position: relative;
      }

      .top {
        position: fixed;
        right: 22px;
        top: 20px;
        z-index: 10;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .status {
        border: 1px solid var(--line);
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        min-height: 34px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        backdrop-filter: blur(12px);
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: var(--radius-pill);
        background: var(--amber);
      }

      .dot.ok {
        background: var(--green);
      }

      .dot.bad {
        background: var(--red);
      }

      .clip {
        width: 34px;
        height: 34px;
        border: 0;
        border-radius: var(--radius-pill);
        color: var(--text);
        background: transparent;
      }

      .home {
        min-height: min(760px, calc(100vh - 20px));
        width: min(900px, calc(100% - 40px));
        margin: 0 auto;
        display: grid;
        place-items: center;
        padding: 56px 0 36px;
        transition: min-height 260ms ease, padding 260ms ease;
      }

      .home.compact {
        min-height: auto;
        padding: 76px 0 20px;
      }

      .center {
        width: 100%;
        display: grid;
        gap: 34px;
        justify-items: center;
        transform: translateY(-20px);
        transition: transform 260ms ease, gap 260ms ease;
      }

      .home.compact .center {
        gap: 14px;
        transform: none;
      }

      .home.compact .intro {
        display: none;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 4.5vw, 50px);
        font-weight: 460;
        line-height: 1.12;
        color: #e8eaed;
        text-align: center;
      }

      .owner {
        color: var(--muted-2);
        font-size: 14px;
        text-align: center;
        margin-top: 12px;
      }

      .ask-card {
        width: min(825px, 100%);
        border-radius: 42px;
        background: #202124;
        box-shadow: var(--shadow);
        border: 1px solid rgba(255, 255, 255, 0.045);
        overflow: hidden;
        transition: width 260ms ease, border-radius 260ms ease, box-shadow 260ms ease;
      }

      .home.compact .ask-card {
        width: min(720px, 100%);
        border-radius: 30px;
        box-shadow: 0 18px 55px rgba(0, 0, 0, 0.35);
      }

      .ask-row {
        min-height: 82px;
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto auto;
        align-items: center;
        gap: 12px;
        padding: 14px 22px;
      }

      .home.compact .ask-row {
        min-height: 64px;
        padding: 10px 16px;
      }

      .plus {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-pill);
        border: 0;
        color: #e8eaed;
        background: transparent;
        font-size: 31px;
        line-height: 1;
        display: grid;
        place-items: center;
      }

      .plus:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .ask {
        width: 100%;
        min-height: 42px;
        max-height: 170px;
        resize: none;
        border: 0;
        outline: none;
        color: var(--text);
        background: transparent;
        line-height: 1.55;
        font-size: 19px;
        overflow-y: auto;
        scrollbar-width: none;
      }

      .ask::-webkit-scrollbar {
        display: none;
      }

      .home.compact .ask {
        min-height: 34px;
        max-height: 92px;
        font-size: 16px;
      }

      .ask::placeholder {
        color: var(--muted);
      }

      .mode {
        height: 36px;
        border: 0;
        border-radius: var(--radius-pill);
        background: transparent;
        color: #dfe2e7;
        padding: 0 10px;
        font-weight: 650;
      }

      .mode:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .home.compact .mode {
        display: none;
      }

      .send {
        height: 42px;
        min-width: 104px;
        border: 0;
        border-radius: var(--radius-pill);
        color: #071016;
        font-weight: 800;
        background: linear-gradient(135deg, var(--blue), var(--violet) 48%, var(--cyan));
      }

      .send:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .home.compact .send {
        min-width: 94px;
      }

      .advanced {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 0 18px 18px;
      }

      .advanced summary {
        list-style: none;
        color: var(--muted);
        font-weight: 700;
        padding: 13px 4px 12px;
        cursor: pointer;
      }

      .advanced summary::-webkit-details-marker {
        display: none;
      }

      .fields {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
      }

      .field {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .field label {
        color: var(--muted-2);
        font-size: 11px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .field input {
        width: 100%;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.06);
        outline: none;
        color: var(--text);
        padding: 0 12px;
      }

      .field input:focus {
        border-color: rgba(138, 180, 248, 0.7);
      }

      .quick {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      .home.compact .quick {
        display: none;
      }

      .quick button {
        height: 38px;
        border: 1px solid var(--line);
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 0 14px;
      }

      .quick button:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .progress {
        width: min(900px, calc(100% - 40px));
        margin: -42px auto 24px;
        display: none;
        justify-content: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .home.compact + .progress {
        margin: 8px auto 24px;
      }

      .progress.on {
        display: flex;
      }

      .step {
        border-radius: var(--radius-pill);
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.06);
        color: var(--muted);
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 800;
      }

      .step.running {
        color: var(--text);
        border-color: rgba(138, 180, 248, 0.45);
        background: rgba(138, 180, 248, 0.16);
      }

      .step.done {
        color: #d6f5df;
        background: rgba(129, 201, 149, 0.14);
      }

      .thread {
        width: min(920px, calc(100% - 40px));
        margin: 0 auto;
        padding: 0 0 80px;
        display: grid;
        gap: 26px;
      }

      .turn {
        display: grid;
        gap: 14px;
        animation: rise 420ms cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .user-bubble {
        justify-self: end;
        max-width: 720px;
        padding: 14px 18px;
        border-radius: 22px 22px 6px 22px;
        background: #303134;
        color: #f1f3f4;
        line-height: 1.5;
      }

      .assistant {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 14px;
      }

      .assistant-mark {
        width: 34px;
        height: 34px;
        border-radius: 13px;
        background: linear-gradient(135deg, var(--blue), var(--violet), var(--cyan));
        display: grid;
        place-items: center;
        color: #071016;
        font-weight: 900;
        margin-top: 2px;
      }

      .answer {
        display: grid;
        gap: 18px;
        min-width: 0;
      }

      .answer h2 {
        margin: 0;
        font-size: clamp(28px, 4vw, 42px);
        font-weight: 520;
        letter-spacing: 0;
      }

      .answer p {
        margin: 0;
        color: #d6d9df;
        line-height: 1.65;
        font-size: 16px;
      }

      .score-line {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 24px;
        padding: 22px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(138, 180, 248, 0.14), rgba(197, 138, 249, 0.11) 46%, rgba(103, 232, 212, 0.08)),
          rgba(255, 255, 255, 0.035);
      }

      .score {
        width: 106px;
        height: 106px;
        border-radius: var(--radius-pill);
        display: grid;
        place-items: center;
        color: #071016;
        background: conic-gradient(from 40deg, var(--blue) calc(var(--score-value, 77) * 1%), rgba(255, 255, 255, 0.08) 0);
        box-shadow: 0 0 45px rgba(138, 180, 248, 0.22);
      }

      .score strong {
        width: 82px;
        height: 82px;
        border-radius: var(--radius-pill);
        display: grid;
        place-items: center;
        background: #111319;
        color: var(--text);
        font-size: 22px;
      }

      .single-answer {
        display: grid;
        gap: 18px;
        max-width: 860px;
      }

      .single-answer section {
        display: grid;
        gap: 8px;
      }

      .single-answer h3 {
        margin: 0;
        font-size: 18px;
      }

      .inline-metrics {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .inline-pill {
        border: 1px solid var(--line);
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.055);
        color: #dfe3ea;
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 750;
      }

      .visual-grid {
        display: grid;
        grid-template-columns: 1.05fr 0.95fr;
        gap: 12px;
      }

      .viz-panel,
      .plan-panel {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.04);
        padding: 16px;
        display: grid;
        gap: 14px;
      }

      .viz-panel h3,
      .plan-panel h3 {
        color: #eef3ff;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 110px minmax(0, 1fr) 54px;
        align-items: center;
        gap: 10px;
        color: #dfe3ea;
        font-size: 13px;
        font-weight: 750;
      }

      .bar {
        height: 9px;
        border-radius: var(--radius-pill);
        background: rgba(255, 255, 255, 0.08);
        overflow: hidden;
      }

      .bar span {
        display: block;
        width: calc(var(--bar-value, 0) * 10%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--blue), var(--violet), var(--cyan));
      }

      .agent-flow {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .agent-pill {
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.04);
      }

      .agent-pill span {
        display: block;
        color: var(--muted-2);
        font-size: 11px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .agent-pill strong {
        display: block;
        margin-top: 6px;
        color: #f1f3f4;
        font-size: 14px;
      }

      .media-strip {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .media-card {
        min-height: 128px;
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.04);
        position: relative;
      }

      .media-card img {
        width: 100%;
        height: 100%;
        min-height: 128px;
        object-fit: cover;
        display: block;
        filter: saturate(0.92) contrast(1.04);
      }

      .media-card span {
        position: absolute;
        left: 10px;
        bottom: 10px;
        right: 10px;
        color: #f8fbff;
        font-size: 12px;
        font-weight: 850;
        text-shadow: 0 1px 12px rgba(0, 0, 0, 0.85);
      }

      .question-grid {
        display: grid;
        gap: 8px;
      }

      .question-chip {
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.045);
        color: #e9edf5;
        padding: 12px 14px;
        text-align: left;
        line-height: 1.42;
      }

      .question-chip:hover {
        border-color: rgba(138, 180, 248, 0.38);
        background: rgba(138, 180, 248, 0.09);
      }

      .toast {
        position: fixed;
        left: 50%;
        bottom: 24px;
        z-index: 50;
        transform: translate(-50%, 12px);
        opacity: 0;
        pointer-events: none;
        border: 1px solid rgba(255, 255, 255, 0.11);
        border-radius: var(--radius-pill);
        background: rgba(20, 22, 28, 0.94);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
        color: var(--text);
        padding: 11px 16px;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .answer-actions {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 4px;
      }

      .action-btn {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: var(--radius-pill);
        color: var(--text);
        background: transparent;
        padding: 0;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        font-weight: 800;
        cursor: pointer;
      }

      .action-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .action-btn svg {
        width: 20px;
        height: 20px;
        stroke-width: 1.9;
      }

      .action-btn.sources-action {
        width: auto;
        padding: 0 12px;
        gap: 8px;
      }

      .action-btn.sources-action span {
        font-size: 14px;
      }

      .action-btn.copied {
        color: #b8f7ff;
      }

      .source-shell {
        position: fixed;
        inset: 0;
        z-index: 30;
        pointer-events: none;
        background: transparent;
      }

      .source-shell.open {
        pointer-events: auto;
      }

      .source-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0);
        transition: background 180ms ease;
      }

      .source-shell.open .source-backdrop {
        background: rgba(0, 0, 0, 0.28);
      }

      .sources-panel {
        position: absolute;
        top: 0;
        right: 0;
        width: min(470px, 100%);
        height: 100%;
        background: #050607;
        border-left: 1px solid rgba(255, 255, 255, 0.11);
        box-shadow: -28px 0 80px rgba(0, 0, 0, 0.45);
        transform: translateX(102%);
        transition: transform 240ms cubic-bezier(0.2, 0.8, 0.2, 1);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .source-shell.open .sources-panel {
        transform: translateX(0);
      }

      .sources-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 66px;
        padding: 0 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }

      .sources-head h2 {
        margin: 0;
        font-size: 22px;
        font-weight: 520;
        display: grid;
        gap: 2px;
      }

      .sources-head h2 span {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .close-sources {
        width: 38px;
        height: 38px;
        border: 0;
        border-radius: var(--radius-pill);
        background: transparent;
        color: var(--text);
        font-size: 24px;
      }

      .close-sources:hover {
        background: rgba(255, 255, 255, 0.08);
      }

      .sources-body {
        min-height: 0;
        overflow: auto;
        padding: 22px 20px 28px;
        display: grid;
        gap: 22px;
      }

      .source-section {
        display: grid;
        gap: 12px;
      }

      .source-section h3 {
        margin: 0;
        font-size: 18px;
        font-weight: 720;
      }

      .source-item {
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.055);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 14px;
        display: grid;
        gap: 8px;
      }

      .source-item strong {
        font-size: 15px;
      }

      .source-item p,
      .source-item a {
        color: var(--muted);
        margin: 0;
        line-height: 1.48;
        font-size: 14px;
      }

      .source-item a {
        text-decoration: none;
      }

      .source-item a:hover {
        color: var(--blue);
      }

      .source-details {
        border-radius: 16px;
      }

      .agent {
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        background: rgba(255, 255, 255, 0.055);
        padding: 18px;
      }

      .metric span {
        display: block;
        color: var(--muted-2);
        font-size: 12px;
        font-weight: 850;
        text-transform: uppercase;
        margin-bottom: 8px;
      }

      .soft-list {
        margin: 0;
        padding: 0;
        list-style: none;
        display: grid;
        gap: 8px;
      }

      .soft-list li {
        color: #d8dce5;
        line-height: 1.45;
      }

      .agent-list {
        display: grid;
        gap: 14px;
      }

      .agent {
        display: grid;
        gap: 14px;
      }

      .agent-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .agent h3 {
        margin: 0 0 6px;
        font-size: 20px;
      }

      .tag {
        flex: 0 0 auto;
        border-radius: var(--radius-pill);
        color: #071016;
        background: linear-gradient(135deg, var(--blue), var(--cyan));
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 900;
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.045);
        padding: 14px;
        min-height: 88px;
      }

      .metric strong {
        display: block;
        font-size: 21px;
        overflow-wrap: anywhere;
      }

      .swot {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      details {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        overflow: hidden;
        background: rgba(0, 0, 0, 0.16);
      }

      summary {
        cursor: pointer;
        padding: 13px 14px;
        font-weight: 850;
      }

      .trace {
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding: 12px;
        display: grid;
        gap: 8px;
      }

      .trace code {
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.055);
        color: #e3edff;
        display: block;
        padding: 11px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.45;
      }

      .error {
        border-radius: 18px;
        border: 1px solid rgba(242, 139, 130, 0.35);
        background: rgba(242, 139, 130, 0.12);
        color: #ffd7d2;
        padding: 14px 16px;
      }

      @media (max-width: 840px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .rail {
          display: none;
        }

        .top {
          position: static;
          padding: 14px 16px 0;
          justify-content: flex-end;
        }

        .home {
          min-height: auto;
          padding: 40px 0 22px;
        }

        .center {
          transform: none;
          gap: 24px;
        }

        .ask-row {
          grid-template-columns: auto minmax(0, 1fr);
        }

        .mode,
        .send {
          grid-column: span 1;
        }

        .ask-row {
          row-gap: 10px;
        }

        .send {
          min-width: 100%;
          grid-column: 1 / -1;
        }

        .fields,
        .metrics,
        .swot,
        .visual-grid,
        .agent-flow,
        .media-strip {
          grid-template-columns: 1fr;
        }

        .sources-panel {
          width: 100%;
        }

        .assistant {
          grid-template-columns: 1fr;
        }

        .assistant-mark {
          display: none;
        }

        .score-line {
          grid-template-columns: 1fr;
        }

        .score {
          width: 88px;
          height: 88px;
        }

        .score strong {
          width: 68px;
          height: 68px;
        }
      }

      @media (max-width: 520px) {
        .home,
        .thread,
        .progress {
          width: min(100% - 22px, 900px);
        }

        h1 {
          font-size: 36px;
        }

        .ask-card {
          border-radius: 30px;
        }

        .ask {
          font-size: 16px;
        }

        .quick {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="rail" aria-label="Navigation">
        <div class="spark" aria-hidden="true"></div>
        <div class="rail-group">
          <button class="icon-btn active" type="button" title="New validation"><span class="icon compose"></span></button>
          <button class="icon-btn" type="button" title="Search"><span class="icon search"></span></button>
          <button class="icon-btn" type="button" title="Reports"><span class="icon grid"><span></span><i></i></span><span class="blue-dot"></span></button>
        </div>
        <div class="rail-bottom">
          <button class="icon-btn" type="button" title="Settings">AF</button>
          <div class="avatar" title="Abdullah Fawad">A</div>
        </div>
      </aside>

      <main class="main">
        <div class="top">
          <span class="status" id="backendBadge">FastAPI</span>
          <span class="status"><span class="dot" id="healthDot"></span><span id="healthText">Checking</span></span>
          <button class="clip" type="button" title="Attachments">...</button>
        </div>

        <section class="home" id="home">
          <div class="center">
            <div class="intro">
              <h1>Any new ideas to explore?</h1>
              <p class="owner">Abdullah Fawad</p>
            </div>

            <form class="ask-card" id="ideaForm">
              <div class="ask-row">
                <button class="plus" type="button" id="setupButton" title="Startup setup">+</button>
                <textarea id="idea_description" class="ask" name="idea_description" required minlength="20" placeholder="Ask Startup Validator">Byoo is an AI-powered group buying platform that helps households and small retailers pool demand, unlock bulk discounts, and coordinate reliable local delivery in Pakistan.</textarea>
                <button class="mode" type="button">Flash v</button>
                <button class="send" id="submitButton" type="submit">Validate</button>
              </div>

              <details class="advanced" id="advancedFields">
                <summary>Startup setup</summary>
                <div class="fields">
                  <div class="field">
                    <label for="startup_name">Startup</label>
                    <input id="startup_name" name="startup_name" required value="Byoo" />
                  </div>
                  <div class="field">
                    <label for="industry">Industry</label>
                    <input id="industry" name="industry" required value="E-commerce" />
                  </div>
                  <div class="field">
                    <label for="geography">Geography</label>
                    <input id="geography" name="geography" required value="Pakistan" />
                  </div>
                  <div class="field">
                    <label for="target_market">Target market</label>
                    <input id="target_market" name="target_market" required value="Urban households and small retailers" />
                  </div>
                  <div class="field">
                    <label for="team_size">Team</label>
                    <input id="team_size" name="team_size" type="number" min="1" max="100" required value="3" />
                  </div>
                  <div class="field">
                    <label for="timeline_months">Months</label>
                    <input id="timeline_months" name="timeline_months" type="number" min="1" max="60" required value="8" />
                  </div>
                  <div class="field" style="grid-column: 1 / -1;">
                    <label for="unique_value_prop">Unique value</label>
                    <input id="unique_value_prop" name="unique_value_prop" value="AI demand pooling for bulk discounts and better local supplier matching" />
                  </div>
                </div>
              </details>
            </form>

            <div class="quick">
              <button type="button" id="demoButton">Load Byoo demo</button>
              <button type="button" id="clearButton">Clear report</button>
              <button type="button" id="openSetupButton">Startup setup</button>
            </div>
          </div>
        </section>

        <div class="progress" id="progress"></div>
        <section class="thread" id="thread"></section>
      </main>
    </div>

    <div class="source-shell" id="sourceShell" aria-hidden="true">
      <div class="source-backdrop" id="sourceBackdrop"></div>
      <aside class="sources-panel" aria-label="Sources">
        <div class="sources-head">
          <h2>Sources <span>Evidence, tools, and agent traces</span></h2>
          <button class="close-sources" id="closeSources" type="button" aria-label="Close sources">x</button>
        </div>
        <div class="sources-body" id="sourcesBody"></div>
      </aside>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const API_URL = window.STARTUP_VALIDATOR_API_URL || (location.protocol.startsWith("http") ? `${location.origin}/validate` : "http://localhost:8000/validate");
      const BACKEND_LABEL = window.STARTUP_VALIDATOR_BACKEND_LABEL || "FastAPI";
      const REQUEST_TIMEOUT_MS = 180000;
      const steps = ["Preparing", "Researching", "Reflecting", "Scoring", "Synthesizing"];

      const form = document.getElementById("ideaForm");
      const thread = document.getElementById("thread");
      const progress = document.getElementById("progress");
      const submitButton = document.getElementById("submitButton");
      const healthDot = document.getElementById("healthDot");
      const healthText = document.getElementById("healthText");
      const advancedFields = document.getElementById("advancedFields");
      const sourceShell = document.getElementById("sourceShell");
      const sourcesBody = document.getElementById("sourcesBody");
      const home = document.getElementById("home");
      const ideaInput = document.getElementById("idea_description");
      const toast = document.getElementById("toast");
      let lastReportText = "";
      let lastRequest = null;
      let lastReportData = null;
      let toastTimer = null;
      document.getElementById("backendBadge").textContent = BACKEND_LABEL;

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function payload() {
        const data = new FormData(form);
        return {
          startup_name: data.get("startup_name"),
          idea_description: data.get("idea_description"),
          industry: data.get("industry"),
          target_market: data.get("target_market"),
          geography: data.get("geography"),
          team_size: Number(data.get("team_size")),
          timeline_months: Number(data.get("timeline_months")),
          unique_value_prop: data.get("unique_value_prop")
        };
      }

      function renderProgress(active = -1, complete = false) {
        progress.classList.add("on");
        progress.innerHTML = steps.map((step, index) => {
          const state = complete || index < active ? "done" : index === active ? "running" : "";
          return `<span class="step ${state}">${escapeHtml(step)}</span>`;
        }).join("");
      }

      function list(items) {
        return `<ul class="soft-list">${(Array.isArray(items) ? items : []).map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
      }

      function numberValue(value, fallback = 0) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : fallback;
      }

      function scorePercent(value) {
        return Math.max(0, Math.min(100, Math.round(numberValue(value) * 10)));
      }

      function metric(label, value) {
        return `<div class="metric"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`;
      }

      function bar(label, value) {
        const numeric = numberValue(value);
        return `
          <div class="bar-row">
            <span>${escapeHtml(label)}</span>
            <div class="bar" style="--bar-value: ${Math.max(0, Math.min(10, numeric))};"><span></span></div>
            <strong>${escapeHtml(numeric ? numeric.toFixed(1) : "--")}</strong>
          </div>
        `;
      }

      function trace(title, items) {
        if (!items || !items.length) return "";
        return `<details><summary>${escapeHtml(title)}</summary><div class="trace">${items.map((item) => `<code>${escapeHtml(typeof item === "string" ? item : JSON.stringify(item, null, 2))}</code>`).join("")}</div></details>`;
      }

      function swotCard(title, items) {
        return `<div class="metric"><span>${escapeHtml(title)}</span>${list(items || [])}</div>`;
      }

      function icon(name) {
        const icons = {
          copy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><rect x="8" y="8" width="11" height="11" rx="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v1"></path></svg>',
          refresh: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M21 12a9 9 0 0 1-15.3 6.4"></path><path d="M3 12A9 9 0 0 1 18.3 5.6"></path><path d="M18 2v4h4"></path><path d="M6 22v-4H2"></path></svg>',
          download: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><path d="M7 10l5 5 5-5"></path><path d="M12 15V3"></path></svg>',
          sources: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"></path></svg>'
        };
        return icons[name] || "";
      }

      function textList(title, items) {
        const lines = (Array.isArray(items) ? items : []).map((item) => `- ${item}`);
        return lines.length ? `${title}\n${lines.join("\n")}` : `${title}\n- Not available`;
      }

      function mediaStrip(items) {
        if (!Array.isArray(items) || !items.length) return "";
        return `
          <section>
            <h3>Visual evidence from search</h3>
            <div class="media-strip">
              ${items.slice(0, 3).map((item, index) => `
                <div class="media-card">
                  <img src="${escapeHtml(item.url || item)}" alt="Market research visual ${index + 1}" loading="lazy" referrerpolicy="no-referrer" />
                  <span>${escapeHtml(item.title || "Live market image")}</span>
                </div>
              `).join("")}
            </div>
          </section>
        `;
      }

      function questionChips(items) {
        if (!Array.isArray(items) || !items.length) return "";
        return `
          <section>
            <h3>Questions to answer next</h3>
            <div class="question-grid">
              ${items.slice(0, 4).map((item) => `<button class="question-chip" type="button">${escapeHtml(item)}</button>`).join("")}
            </div>
          </section>
        `;
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
      }

      function buildPlainAnswer(data) {
        const final = data.final_evaluation || {};
        const reports = data.specialist_reports || {};
        const market = reports.market_research || {};
        const risk = reports.risk_swot || {};
        const viability = reports.viability_scorer || {};
        return [
          `${final.verdict || "Final verdict"} (${final.overall_score || "--"}/10)`,
          final.summary || "",
          `Market: ${market.estimated_market_size || "Unknown"}`,
          `Risk: ${risk.risk_level || "Medium"}`,
          `Viability: ${viability.viability_score || "--"}/10`,
          textList("Strengths", final.top_strengths),
          textList("Concerns", final.top_concerns),
          textList("Recommendations", final.recommendations),
          textList("Validation experiments", final.validation_experiments),
          textList("MVP blueprint", final.mvp_blueprint),
          textList("Marketing plan", final.marketing_plan)
        ].filter(Boolean).join("\n\n");
      }

      function sourceItem(title, body) {
        return `<div class="source-item"><strong>${escapeHtml(title)}</strong><p>${escapeHtml(body)}</p></div>`;
      }

      function sourceLinks(sources) {
        if (!Array.isArray(sources) || !sources.length) {
          return sourceItem("Live web links", "No external links were returned in this run. Demo fallback kept the report available.");
        }
        return sources.map((source) => `
          <div class="source-item">
            <strong>${escapeHtml(source.title || "Web source")}</strong>
            ${source.url ? `<a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">${escapeHtml(source.url)}</a>` : "<p>No URL</p>"}
          </div>
        `).join("");
      }

      function buildSources(data) {
        const reports = data.specialist_reports || {};
        const market = reports.market_research || {};
        const risk = reports.risk_swot || {};
        const viability = reports.viability_scorer || {};
        return `
          <section class="source-section">
            <h3>Run context</h3>
            ${sourceItem("Backend", `${BACKEND_LABEL} / ${data.execution_mode || "sequential"} orchestration`)}
            ${sourceItem("Execution time", `${data.execution_time_s || "--"} seconds`)}
            ${sourceItem("What was used", "FastAPI coordinates three agents. Groq handles LLM reasoning, Tavily powers live market search, Wikipedia supplies public context, and deterministic Python tools calculate viability scores.")}
            ${sourceItem("Model and APIs", "Groq is used for LLM reasoning when configured. Tavily and Wikipedia support live ReAct market research. Demo fallback is used when keys or services are unavailable.")}
            ${sourceItem("My view", "This is the cleaner presentation: keep the investor-style verdict in one chat answer, then place evidence and course-pattern proof in Sources so the UI stays premium without hiding the agent work.")}
          </section>

          <section class="source-section">
            <h3>Market research</h3>
            ${sourceItem("Pattern", `ReAct loop with ${market.react_turns || 0} turns`)}
            ${sourceItem("Status", market.status || "complete")}
            ${sourceItem("Visuals", `${Array.isArray(market.media) ? market.media.length : 0} image result(s) returned by Tavily`)}
            ${sourceLinks(market.sources)}
            <details class="source-details">
              <summary>ReAct trace</summary>
              <div class="trace">${(market.reasoning_trace || []).map((item) => `<code>${escapeHtml(item)}</code>`).join("")}</div>
            </details>
          </section>

          <section class="source-section">
            <h3>Reflection</h3>
            ${sourceItem("Pattern", `Generator critic revise loop, ${risk.reflection_rounds || 0} round(s)`)}
            ${sourceItem("Risk level", risk.risk_level || "Medium")}
            <details class="source-details">
              <summary>Critique trace</summary>
              <div class="trace">${(risk.critiques || []).map((item) => `<code>${escapeHtml(item)}</code>`).join("")}</div>
            </details>
          </section>

          <section class="source-section">
            <h3>Tool use</h3>
            ${sourceItem("Pattern", "Structured business tools with deterministic scoring")}
            ${sourceItem("Tools", "estimate_market_potential, check_competition_level, calculate_viability_score")}
            <details class="source-details">
              <summary>Tool calls</summary>
              <div class="trace">${(viability.tools_called || []).map((item) => `<code>${escapeHtml(JSON.stringify(item, null, 2))}</code>`).join("")}</div>
            </details>
          </section>
        `;
      }

      function openSources() {
        sourceShell.classList.add("open");
        sourceShell.setAttribute("aria-hidden", "false");
      }

      function closeSources() {
        sourceShell.classList.remove("open");
        sourceShell.setAttribute("aria-hidden", "true");
      }

      function compactComposer() {
        home.classList.add("compact");
        advancedFields.open = false;
        ideaInput.value = "";
        ideaInput.placeholder = "Ask another startup idea";
      }

      function resetComposer() {
        home.classList.remove("compact");
        ideaInput.placeholder = "Ask Startup Validator";
      }

      async function copyAnswer(event) {
        if (!lastReportText) return;
        const button = event.currentTarget;
        let copied = false;
        try {
          if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(lastReportText);
            copied = true;
          }
        } catch {
          copied = false;
        }

        if (!copied) {
          const helper = document.createElement("textarea");
          helper.value = lastReportText;
          helper.setAttribute("readonly", "");
          helper.style.position = "fixed";
          helper.style.top = "0";
          helper.style.left = "0";
          helper.style.opacity = "0";
          document.body.appendChild(helper);
          helper.focus();
          helper.select();
          copied = document.execCommand("copy");
          helper.remove();
        }

        if (copied) {
          button.classList.add("copied");
          button.title = "Copied";
          showToast("Answer copied");
          setTimeout(() => {
            button.classList.remove("copied");
            button.title = "Copy answer";
          }, 1400);
        } else {
          button.title = "Copy unavailable";
          showToast("Copy unavailable");
        }
      }

      function exportReport() {
        if (!lastReportData) return;
        const blob = new Blob([JSON.stringify(lastReportData, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `${(lastRequest?.startup_name || "startup").toLowerCase().replace(/[^a-z0-9]+/g, "-")}-validation-report.json`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        showToast("JSON report exported");
      }

      function renderReport(data, request) {
        const final = data.final_evaluation || {};
        const reports = data.specialist_reports || {};
        const market = reports.market_research || {};
        const risk = reports.risk_swot || {};
        const viability = reports.viability_scorer || {};
        const conflicts = data.conflicts_detected || [];
        const overallPercent = scorePercent(final.overall_score);
        lastReportText = buildPlainAnswer(data);
        lastReportData = data;
        sourcesBody.innerHTML = buildSources(data);

        thread.innerHTML = `
          <div class="turn">
            <div class="user-bubble">${escapeHtml(request.idea_description)}</div>
          </div>

          <div class="turn assistant">
            <div class="assistant-mark">AI</div>
            <div class="answer single-answer">
              <div class="score-line">
                <div>
                  <h2>${escapeHtml(final.verdict || "Final verdict")}</h2>
                  <p>${escapeHtml(final.summary || "")}</p>
                </div>
                <div class="score" style="--score-value: ${overallPercent};"><strong>${escapeHtml(final.overall_score || "--")}</strong></div>
              </div>
              ${conflicts.length ? `<div class="error">${escapeHtml(conflicts.join(" "))}</div>` : ""}

              <div class="inline-metrics">
                <span class="inline-pill">Market: ${escapeHtml(market.estimated_market_size || "Unknown")}</span>
                <span class="inline-pill">Risk: ${escapeHtml(risk.risk_level || "Medium")}</span>
                <span class="inline-pill">Viability: ${escapeHtml(viability.viability_score || "--")} / 10</span>
                <span class="inline-pill">Competition: ${escapeHtml(viability.competition_score || "--")} / 10</span>
              </div>

              <div class="visual-grid">
                <section class="viz-panel">
                  <h3>Score visualization</h3>
                  ${bar("Market", viability.market_score || 0)}
                  ${bar("Competition", viability.competition_score || 0)}
                  ${bar("Viability", viability.viability_score || final.overall_score || 0)}
                </section>
                <section class="viz-panel">
                  <h3>Agent pipeline</h3>
                  <div class="agent-flow">
                    <div class="agent-pill"><span>ReAct</span><strong>${escapeHtml(market.status || "complete")}</strong></div>
                    <div class="agent-pill"><span>Reflection</span><strong>${escapeHtml(risk.status || "complete")}</strong></div>
                    <div class="agent-pill"><span>Tool Use</span><strong>${escapeHtml(viability.status || "complete")}</strong></div>
                  </div>
                </section>
              </div>

              ${mediaStrip(market.media || [])}

              <section>
                <h3>What looks strong</h3>
                ${list(final.top_strengths || [])}
              </section>

              <section>
                <h3>What needs caution</h3>
                ${list(final.top_concerns || [])}
              </section>

              <section>
                <h3>Recommended next moves</h3>
                ${list(final.recommendations || [])}
              </section>

              <div class="visual-grid">
                <section class="plan-panel">
                  <h3>MVP and code structure</h3>
                  ${list(final.mvp_blueprint || final.technical_structure || [])}
                </section>
                <section class="plan-panel">
                  <h3>Marketing plan</h3>
                  ${list(final.marketing_plan || [])}
                </section>
              </div>

              <section class="plan-panel">
                <h3>Validation experiments</h3>
                ${list(final.validation_experiments || [])}
              </section>

              ${questionChips(final.follow_up_questions || [])}

              <div class="answer-actions">
                <button class="action-btn" id="copyAnswerButton" type="button" title="Copy answer" aria-label="Copy answer">${icon("copy")}</button>
                <button class="action-btn" id="regenerateButton" type="button" title="Regenerate analysis" aria-label="Regenerate analysis">${icon("refresh")}</button>
                <button class="action-btn" id="exportButton" type="button" title="Export JSON report" aria-label="Export JSON report">${icon("download")}</button>
                <button class="action-btn sources-action" id="sourcesButton" type="button" title="View sources">${icon("sources")}<span>Sources</span></button>
              </div>
            </div>
          </div>
        `;
        document.getElementById("copyAnswerButton").addEventListener("click", copyAnswer);
        document.getElementById("regenerateButton").addEventListener("click", () => {
          if (lastRequest) {
            showToast("Regenerating analysis");
            runValidation(lastRequest);
          }
        });
        document.getElementById("exportButton").addEventListener("click", exportReport);
        document.getElementById("sourcesButton").addEventListener("click", openSources);
        document.querySelectorAll(".question-chip").forEach((button) => {
          button.addEventListener("click", () => {
            ideaInput.value = button.textContent.trim();
            ideaInput.focus();
            showToast("Question moved to composer");
          });
        });
      }

      function renderLoading(request) {
        thread.innerHTML = `
          <div class="turn"><div class="user-bubble">${escapeHtml(request.idea_description)}</div></div>
          <div class="turn assistant">
            <div class="assistant-mark">AI</div>
            <div class="answer">
              <p>Running the three-agent validation. Market research, reflection, scoring, and synthesis are in progress.</p>
            </div>
          </div>
        `;
      }

      function renderError(error) {
        thread.innerHTML = `<div class="turn assistant"><div class="assistant-mark">AI</div><div class="answer"><div class="error"><strong>Validation failed.</strong> ${escapeHtml(error.message || error)}</div></div></div>`;
      }

      async function checkHealth() {
        try {
          const healthUrl = API_URL.replace(/\/validate\/?$/, "/health");
          const response = await fetch(healthUrl);
          const data = await response.json();
          healthDot.className = `dot ${data.status === "ok" ? "ok" : ""}`;
          healthText.textContent = data.status === "ok" ? "Live APIs ready" : "Demo fallback ready";
        } catch {
          healthDot.className = "dot bad";
          healthText.textContent = "Backend offline";
        }
      }

      async function validateStartup(request) {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(request),
            signal: controller.signal
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.detail ? JSON.stringify(data.detail) : "Request failed");
          return data;
        } finally {
          clearTimeout(timeout);
        }
      }

      async function runValidation(requestOverride = null) {
        const request = requestOverride || payload();
        lastRequest = request;
        compactComposer();
        submitButton.disabled = true;
        submitButton.textContent = "Running";
        renderLoading(request);
        let active = 0;
        renderProgress(active);
        const interval = setInterval(() => {
          active = Math.min(active + 1, steps.length - 1);
          renderProgress(active);
        }, 950);

        try {
          const data = await validateStartup(request);
          clearInterval(interval);
          renderProgress(steps.length, true);
          renderReport(data, request);
        } catch (error) {
          clearInterval(interval);
          renderError(error);
        } finally {
          submitButton.disabled = false;
          submitButton.textContent = "Validate";
        }
      }

      function loadByoo() {
        document.getElementById("startup_name").value = "Byoo";
        document.getElementById("idea_description").value = "Byoo is an AI-powered group buying platform that helps households and small retailers pool demand, unlock bulk discounts, and coordinate reliable local delivery in Pakistan.";
        document.getElementById("industry").value = "E-commerce";
        document.getElementById("geography").value = "Pakistan";
        document.getElementById("target_market").value = "Urban households and small retailers";
        document.getElementById("unique_value_prop").value = "AI demand pooling for bulk discounts and better local supplier matching";
        document.getElementById("team_size").value = "3";
        document.getElementById("timeline_months").value = "8";
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        runValidation();
      });
      document.getElementById("demoButton").addEventListener("click", loadByoo);
      document.getElementById("clearButton").addEventListener("click", () => {
        progress.classList.remove("on");
        thread.innerHTML = "";
        lastRequest = null;
        lastReportData = null;
        lastReportText = "";
        resetComposer();
      });
      document.getElementById("setupButton").addEventListener("click", () => {
        advancedFields.open = !advancedFields.open;
      });
      document.getElementById("openSetupButton").addEventListener("click", () => {
        advancedFields.open = true;
      });
      document.getElementById("closeSources").addEventListener("click", closeSources);
      document.getElementById("sourceBackdrop").addEventListener("click", closeSources);

      checkHealth();
    </script>
  </body>
</html>
